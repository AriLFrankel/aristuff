<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Values Card Sort</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: white;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .board {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .column {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      width: 240px;
      min-height: 420px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .column:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.2);
    }

    .column h2 {
      text-align: center;
      font-size: 1.1rem;
      margin-top: 0;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .dropzone {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }

    .dropzone.dragover {
      background: rgba(37, 99, 235, 0.1);
      outline: 2px dashed #667eea;
      border-radius: 8px;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: grab;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      backdrop-filter: blur(5px);
      transition: all 0.2s ease;
    }
    
    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      background: rgba(255, 255, 255, 0.95);
    }

    .card:active {
      cursor: grabbing;
    }

    .card-title {
      font-weight: 600;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #333;
      margin-top: 4px;
    }

    .controls {
      margin-top: 20px;
      text-align: center;
    }

    button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 0.9rem;
      cursor: pointer;
      margin: 4px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      backdrop-filter: blur(5px);
      transition: all 0.2s ease;
    }
    
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      background: rgba(255, 255, 255, 1);
    }
    
    button:active {
      transform: translateY(0);

    pre {
      text-align: left;
      max-width: 1000px;
      margin: 20px auto;
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.8rem;
    }

    @media print {
      body {
        background: white;
        font-size: 8pt;
        margin: 0.3in;
        padding: 0;
      }
      
      h1 {
        font-size: 12pt;
        margin: 0 0 0.1in 0;
        text-align: center;
      }
      
      .board {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0.08in;
        page-break-inside: avoid;
        width: 100%;
      }
      
      .column {
        box-shadow: none;
        border: 1px solid #999;
        page-break-inside: avoid;
        min-height: auto;
        max-height: none;
        padding: 0.05in;
        width: auto;
        background: white;
      }
      
      .column h2 {
        font-size: 9pt;
        margin: 0 0 0.05in 0;
        text-align: center;
        font-weight: bold;
      }
      
      .dropzone {
        padding: 0;
        min-height: auto;
      }
      
      .card {
        background: white;
        border: 1px solid #ccc;
        page-break-inside: avoid;
        margin-bottom: 0.02in;
        padding: 0.03in;
        font-size: 7pt;
        line-height: 1.1;
      }
      
      .card-title {
        font-weight: bold;
        font-size: 7pt;
        margin-bottom: 0.01in;
      }
      
      .card-desc {
        font-size: 6pt;
        color: #555;
        margin: 0;
        line-height: 1.0;
      }
    }
    
    /* Mobile responsiveness */
    @media (max-width: 1024px) {
      .board {
        gap: 12px;
      }
      
      .column {
        width: 200px;
        min-height: 350px;
        max-height: 70vh;
      }
    }
    
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }
      
      h1 {
        font-size: 1.5rem;
        margin-bottom: 15px;
      }
      
      .board {
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }
      
      .column {
        width: 100%;
        max-width: 350px;
        min-height: 200px;
        max-height: none;
      }
      
      .column h2 {
        font-size: 1.2rem;
      }
      
      .card {
        padding: 12px;
        margin-bottom: 10px;
        /* Enhanced touch targets */
        min-height: 44px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      
      .card-title {
        font-size: 1rem;
      }
      
      .card-desc {
        font-size: 0.9rem;
      }
      
      .controls {
        margin-top: 15px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
      
      button {
        padding: 12px 16px;
        font-size: 1rem;
        min-height: 44px;
        touch-action: manipulation;
      }
    }
    
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      
      h1 {
        font-size: 1.3rem;
      }
      
      .column {
        padding: 10px;
        max-width: 100%;
      }
      
      .column h2 {
        font-size: 1.1rem;
        margin-bottom: 8px;
      }
      
      .card {
        padding: 10px;
        margin-bottom: 8px;
      }
      
      .card-title {
        font-size: 0.95rem;
      }
      
      .card-desc {
        font-size: 0.85rem;
      }
      
      button {
        padding: 10px 14px;
        font-size: 0.9rem;
        flex: 1;
        min-width: 120px;
      }
      
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>

<body>

<h1>Personal Values Card Sort</h1>

<div class="board">
  <div class="column">
    <h2>INFLEXIBLY IMPORTANT</h2>
    <div class="dropzone" data-category="inflexibly_important"></div>
  </div>

  <div class="column">
    <h2>FLEXIBLY IMPORTANT</h2>
    <div class="dropzone" data-category="flexibly_important"></div>
  </div>

  <div class="column">
    <h2>INDIFFERENT</h2>
    <div class="dropzone" data-category="indifferent"></div>
  </div>

  <div class="column">
    <h2>FLEXIBLY REJECT</h2>
    <div class="dropzone" data-category="flexibly_reject"></div>
  </div>

  <div class="column">
    <h2>INFLEXIBLY REJECT</h2>
    <div class="dropzone" data-category="inflexibly_reject"></div>
  </div>
</div>

<div class="controls">
  <button onclick="exportToPDF()">Download Text Report</button>
  <button onclick="exportToFile()">Download JSON</button>
  
  <input type="file" id="fileInput" accept="application/json" hidden onchange="importFromFile(this)">
  <button onclick="document.getElementById('fileInput').click()">Import JSON</button>

  <button onclick="resetState()">Reset</button>
</div>

<script>
const STORAGE_KEY = "personal_values_card_sort_v1";

const values = [
  ["Acceptance","To be accepted as I am"],
  ["Accuracy","To be accurate in my opinions and beliefs"],
  ["Achievement","To have important accomplishments"],
  ["Adventure","To have new and exciting experiences"],
  ["Attractiveness","To be physically attractive"],
  ["Authority","To be in charge of and responsible for others"],
  ["Autonomy","To be self-determined and independent"],
  ["Beauty","To appreciate beauty around me"],
  ["Caring","To take care of others"],
  ["Challenge","To take on difficult tasks and problems"],
  ["Change","To have a life full of change and variety"],
  ["Comfort","To have a pleasant and comfortable life"],
  ["Commitment","To make enduring, meaningful commitments"],
  ["Compassion","To feel and act on concern for others"],
  ["Contribution","To make a lasting contribution in the world"],
  ["Cooperation","To work collaboratively with others"],
  ["Courtesy","To be considerate and polite toward others"],
  ["Creativity","To have new and original ideas"],
  ["Dependability","To be reliable and trustworthy"],
  ["Duty","To carry out my duties and obligations"],
  ["Ecology","To live in harmony with the environment"],
  ["Excitement","To have a life full of thrills and stimulation"],
  ["Faithfulness","To be loyal and true in relationships"],
  ["Fame","To be known and recognized"],
  ["Family","To have a happy, loving family"],
  ["Fitness","To be physically fit and strong"],
  ["Flexibility","To adjust to new circumstances easily"],
  ["Forgiveness","To be forgiving of others"],
  ["Friendship","To have close, supportive friends"],
  ["Fun","To play and have fun"],
  ["Generosity","To give what I have to others"],
  ["Genuineness","To act in a manner true to who I am"],
  ["God’s Will","To seek and obey the will of God"],
  ["Growth","To keep changing and growing"],
  ["Health","To be physically well and healthy"],
  ["Helpfulness","To be helpful to others"],
  ["Honesty","To be honest and truthful"],
  ["Hope","To maintain a positive, optimistic outlook"],
  ["Humility","To be modest and unassuming"],
  ["Humor","To see the humorous side of life"],
  ["Independence","To be free from dependence on others"],
  ["Industry","To work hard and well"],
  ["Inner Peace","To experience personal peace"],
  ["Intimacy","To share my innermost experiences"],
  ["Justice","To promote fair and equal treatment"],
  ["Knowledge","To learn and contribute knowledge"],
  ["Leisure","To take time to relax and enjoy"],
  ["Loved","To be loved by those close to me"],
  ["Loving","To give love to others"],
  ["Mastery","To be competent in daily activities"],
  ["Mindfulness","To live conscious of the present moment"],
  ["Moderation","To avoid excesses and find balance"],
  ["Monogamy","To have one close, loving relationship"],
  ["Nonconformity","To question authority and norms"],
  ["Nurturance","To take care of and nurture others"],
  ["Openness","To be open to new experiences"],
  ["Order","To have a well-ordered life"],
  ["Passion","To have deep feelings"],
  ["Pleasure","To feel good"],
  ["Popularity","To be well-liked"],
  ["Power","To have control over others"],
  ["Purpose","To have meaning and direction"],
  ["Rationality","To be guided by reason and logic"],
  ["Realism","To act realistically and practically"],
  ["Responsibility","To make responsible decisions"],
  ["Risk","To take risks and chances"],
  ["Romance","To have exciting love"],
  ["Safety","To be safe and secure"],
  ["Self-Acceptance","To accept myself as I am"],
  ["Self-Control","To be disciplined in my actions"],
  ["Self-Esteem","To feel good about myself"],
  ["Self-Knowledge","To understand myself deeply"],
  ["Service","To be of service to others"],
  ["Sexuality","To have a satisfying sex life"],
  ["Simplicity","To live simply"],
  ["Solitude","To have time alone"],
  ["Spirituality","To grow spiritually"],
  ["Stability","To have a consistent life"],
  ["Tolerance","To respect those who differ"],
  ["Tradition","To follow respected patterns"],
  ["Virtue","To live morally"],
  ["Wealth","To have plenty of money"],
  ["World Peace","To promote peace in the world"]
];

let draggedCard = null;
let touchOffset = { x: 0, y: 0 };
let isDragging = false;
let originalPosition = null;
let ghostCard = null;

const initialZone = document.querySelector('[data-category="indifferent"]');

values.forEach(([title, desc]) => {
  const card = document.createElement("div");
  card.className = "card";
  card.draggable = true;
  card.dataset.value = title;

  card.innerHTML = `
    <div class="card-title">${title}</div>
    <div class="card-desc">${desc}</div>
  `;

  card.addEventListener("dragstart", (e) => {
    draggedCard = card;
    setTimeout(() => card.style.display = "none", 0);
  });
  
  card.addEventListener("dragend", (e) => {
    if (draggedCard && draggedCard.style.display === "none") {
      draggedCard.style.display = "block";
    }
  });
  
  // Touch support for mobile
  card.addEventListener("touchstart", handleTouchStart, { passive: false });
  card.addEventListener("touchmove", handleTouchMove, { passive: false });
  card.addEventListener("touchend", handleTouchEnd, { passive: false });
  
  // Prevent context menu on long press
  card.addEventListener("contextmenu", (e) => e.preventDefault());

  initialZone.appendChild(card);
});

// Touch handling functions for mobile drag and drop
function getInsertionIndex(dropzone, clientY) {
  const cards = [...dropzone.querySelectorAll('.card')];
  
  for (let i = 0; i < cards.length; i++) {
    const card = cards[i];
    if (card === draggedCard) continue; // Skip the card being dragged
    
    const rect = card.getBoundingClientRect();
    const cardMiddle = rect.top + rect.height / 2;
    
    if (clientY < cardMiddle) {
      return i;
    }
  }
  
  return cards.length; // Insert at end
}

function insertCardAtPosition(dropzone, card, index) {
  const cards = [...dropzone.querySelectorAll('.card')];
  
  if (index >= cards.length) {
    dropzone.appendChild(card);
  } else {
    dropzone.insertBefore(card, cards[index]);
  }
}

function handleTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const card = e.currentTarget;
  
  draggedCard = card;
  isDragging = false;
  
  const rect = card.getBoundingClientRect();
  touchOffset.x = touch.clientX - rect.left;
  touchOffset.y = touch.clientY - rect.top;
  
  // Store original position
  originalPosition = {
    parent: card.parentNode,
    nextSibling: card.nextElementSibling
  };
  
  // Small delay to distinguish between tap and drag
  setTimeout(() => {
    if (draggedCard === card) {
      startDragging(card, touch);
    }
  }, 150);
}

function startDragging(card, touch) {
  isDragging = true;
  
  // Create ghost element
  ghostCard = card.cloneNode(true);
  ghostCard.style.position = 'fixed';
  ghostCard.style.pointerEvents = 'none';
  ghostCard.style.zIndex = '1000';
  ghostCard.style.opacity = '0.8';
  ghostCard.style.transform = 'rotate(5deg)';
  ghostCard.style.width = card.offsetWidth + 'px';
  ghostCard.style.left = (touch.clientX - touchOffset.x) + 'px';
  ghostCard.style.top = (touch.clientY - touchOffset.y) + 'px';
  
  document.body.appendChild(ghostCard);
  
  // Hide original card
  card.style.opacity = '0.3';
  
  // Add visual feedback
  document.body.style.userSelect = 'none';
  document.querySelectorAll('.dropzone').forEach(zone => {
    zone.style.background = '#f0f0f0';
    zone.style.border = '2px dashed #ccc';
  });
}

function handleTouchMove(e) {
  if (!isDragging || !ghostCard) return;
  
  e.preventDefault();
  const touch = e.touches[0];
  
  // Move ghost element
  ghostCard.style.left = (touch.clientX - touchOffset.x) + 'px';
  ghostCard.style.top = (touch.clientY - touchOffset.y) + 'px';
  
  // Find dropzone under finger
  const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
  const dropzone = elementBelow?.closest('.dropzone');
  
  // Update dropzone highlights
  document.querySelectorAll('.dropzone').forEach(zone => {
    if (zone === dropzone) {
      zone.classList.add('dragover');
    } else {
      zone.classList.remove('dragover');
    }
  });
}

function handleTouchEnd(e) {
  e.preventDefault();
  
  if (!isDragging) {
    // This was just a tap, not a drag
    draggedCard = null;
    return;
  }
  
  const touch = e.changedTouches[0];
  const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
  const dropzone = elementBelow?.closest('.dropzone');
  
  // Clean up visual feedback
  if (ghostCard) {
    ghostCard.remove();
    ghostCard = null;
  }
  
  draggedCard.style.opacity = '1';
  document.body.style.userSelect = '';
  
  document.querySelectorAll('.dropzone').forEach(zone => {
    zone.classList.remove('dragover');
    zone.style.background = '';
    zone.style.border = '';
  });
  
  // Handle drop
  if (dropzone) {
    const insertIndex = getInsertionIndex(dropzone, touch.clientY);
    insertCardAtPosition(dropzone, draggedCard, insertIndex);
    saveState();
  } else {
    // Return to original position if no valid drop target
    if (originalPosition.nextSibling) {
      originalPosition.parent.insertBefore(draggedCard, originalPosition.nextSibling);
    } else {
      originalPosition.parent.appendChild(draggedCard);
    }
  }
  
  // Reset variables
  isDragging = false;
  draggedCard = null;
  originalPosition = null;
}

document.querySelectorAll(".dropzone").forEach(zone => {
  zone.addEventListener("dragover", e => {
    e.preventDefault();
    zone.classList.add("dragover");
  });

  zone.addEventListener("dragleave", () => {
    zone.classList.remove("dragover");
  });

  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("dragover");
    if (draggedCard) {
      const insertIndex = getInsertionIndex(zone, e.clientY);
      insertCardAtPosition(zone, draggedCard, insertIndex);
      draggedCard.style.display = "block";
      draggedCard = null;
      saveState();
    }
  });
});

function getCurrentState() {
  const state = {};
  document.querySelectorAll(".dropzone").forEach(zone => {
    state[zone.dataset.category] =
      [...zone.querySelectorAll(".card")].map(c => c.dataset.value);
  });
  return state;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(getCurrentState()));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  applyState(JSON.parse(raw));
}

function applyState(state) {
  const cards = {};
  document.querySelectorAll(".card").forEach(c => cards[c.dataset.value] = c);
  document.querySelectorAll(".dropzone").forEach(z => z.innerHTML = "");

  Object.entries(state).forEach(([cat, vals]) => {
    let zone = document.querySelector(`.dropzone[data-category="${cat}"]`);
    if (!zone) {
      zone = document.querySelector('[data-category="indifferent"]');
    };
    vals.forEach(v => cards[v] && zone.appendChild(cards[v]));
  });
}

function exportToPDF() {
  const state = getCurrentState();
  const columnNames = {
    'inflexibly_important': 'Inflexibly Important',
    'flexibly_important': 'Flexibly Important', 
    'indifferent': 'Indifferent',
    'flexibly_reject': 'Flexibly reject',
    'inflexibly_reject': 'Inflexibly reject'
  };
  
  let content = "PERSONAL VALUES CARD SORT RESULTS\n";
  content += "=".repeat(50) + "\n\n";
  content += `Date: ${new Date().toLocaleDateString()}\n\n`;
  
  // Create text list for each column
  Object.entries(columnNames).forEach(([key, title]) => {
    const items = state[key] || [];
    content += `${title.toUpperCase()}\n`;
    content += "-".repeat(title.length) + "\n";
    
    if (items.length === 0) {
      content += "(No values assigned)\n";
    } else {
      items.forEach((item, index) => {
        content += `${index + 1}. ${item}\n`;
      });
    }
    content += "\n";
  });
  
  // Download as text file
  const blob = new Blob([content], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "values-card-sort-results.txt";
  a.click();
  URL.revokeObjectURL(url);
}

function exportToFile() {
  const blob = new Blob(
    [JSON.stringify(getCurrentState(), null, 2)],
    { type: "application/json" }
  );
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "values-card-sort.json";
  a.click();
  URL.revokeObjectURL(url);
}

function importFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const state = JSON.parse(e.target.result);
    applyState(state);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  };
  reader.readAsText(file);
  input.value = "";
}

function resetState() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

loadState();
</script>

<script>
// Add touch support detection
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.body.classList.add('touch-device');
  // Improve scrolling on mobile
  document.addEventListener('touchmove', function(e) {
    if (isDragging) {
      e.preventDefault();
    }
  }, { passive: false });
}
</script>

</body>
</html>
